clean_rooms:
  name: Clean Rooms
  description: "Send the vacuum to clean one or more rooms by name."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    rooms:
      name: Rooms
      description: "List of room names to clean."
      required: true
      example: '["Kitchen", "Living Room"]'
      selector:
        object:
    passes:
      name: Passes
      description: "Number of cleaning passes (1-3)."
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: slider

start:
  name: Start Cleaning
  description: "Start cleaning with optional room or zone selection."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    rooms:
      name: Rooms
      description: "List of room names or IDs to clean."
      required: false
      example: '["Kitchen", "Living Room"]'
      selector:
        object:
    zone:
      name: Zone
      description: "Rectangular zone as [x1, y1, x2, y2]."
      required: false
      example: "[10, 20, 30, 40]"
      selector:
        object:
    passes:
      name: Passes
      description: "Number of cleaning passes (1-3)."
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: slider

spot_clean:
  name: Spot Clean
  description: "Start spot cleaning at a point or at the current position."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    x:
      name: X Coordinate
      description: "Target X coordinate (omit to clean in place)."
      required: false
      selector:
        number:
          mode: box
    y:
      name: Y Coordinate
      description: "Target Y coordinate (omit to clean in place)."
      required: false
      selector:
        number:
          mode: box
    repeats:
      name: Repeats
      description: "Number of spot clean repetitions (1-5)."
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 5
          step: 1
          mode: slider

edge_clean:
  name: Edge Clean
  description: "Start wall-follow cleaning, optionally at a specific location."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    room:
      name: Room
      description: "Room name to navigate to first."
      required: false
      selector:
        text:
    x:
      name: X Coordinate
      description: "Target X coordinate to navigate to first."
      required: false
      selector:
        number:
          mode: box
    y:
      name: Y Coordinate
      description: "Target Y coordinate to navigate to first."
      required: false
      selector:
        number:
          mode: box
    passes:
      name: Passes
      description: "Number of edge cleaning passes (1-3)."
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: slider

goto:
  name: Go To Point
  description: "Navigate to a point on the map and pause on arrival."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    x:
      name: X Coordinate
      description: "Target X coordinate."
      required: true
      selector:
        number:
          mode: box
    y:
      name: Y Coordinate
      description: "Target Y coordinate."
      required: true
      selector:
        number:
          mode: box

remote_control:
  name: Remote Control
  description: "Send a directional movement command to the robot."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    direction:
      name: Direction
      description: "Movement direction."
      required: true
      selector:
        select:
          options:
            - forward
            - back
            - left
            - right
            - stop
