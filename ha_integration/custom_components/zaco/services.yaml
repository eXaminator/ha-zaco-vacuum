clean_rooms:
  name: Clean Rooms
  description: "Send the vacuum to clean one or more rooms by name."
  fields:
    entity_id:
      name: Vacuum Entity
      description: "The ZACO vacuum entity to control."
      required: true
      selector:
        entity:
          domain: vacuum
          integration: zaco
    rooms:
      name: Rooms
      description: "List of room names to clean."
      required: true
      example: '["Kitchen", "Living Room"]'
      selector:
        object:
    passes:
      name: Passes
      description: "Number of cleaning passes (1-3)."
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: slider
